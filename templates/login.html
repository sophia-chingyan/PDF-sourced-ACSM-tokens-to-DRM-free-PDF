<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - ACSM Converter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 0.25rem; }
        .login-card p { color: #78909c; margin-bottom: 1.5rem; }
        .error {
            color: #c62828;
            background: #fce4ec;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.7rem 1.25rem;
            border-radius: 8px;
            border: 1.5px solid #dadce0;
            background: #fff;
            color: #3c4043;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
            color: #3c4043;
        }
        .btn-google svg { flex-shrink: 0; }
        .lock-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">🔒</div>
        <h2>ACSM Converter</h2>
        <p>Sign in with your Google account to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <a href="/login/google" class="btn-google">
            <!-- Google "G" logo -->
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
        </a>
    </div>
</body>
</html>
